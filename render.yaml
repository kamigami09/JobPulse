services:
  - type: web
    name: jobpulse-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn --bind 0.0.0.0:$PORT run:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jobpulse-db
          property: connectionString

databases:
  - name: jobpulse-db
    databaseName: jobpulse
    user: jobpulse
